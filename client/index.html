<!doctype html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>QualiControl</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Load analytics only if configured
      const endpoint = "%VITE_ANALYTICS_ENDPOINT%";
      const websiteId = "%VITE_ANALYTICS_WEBSITE_ID%";
      if (endpoint && endpoint !== "%VITE_ANALYTICS_ENDPOINT%" && websiteId && websiteId !== "%VITE_ANALYTICS_WEBSITE_ID%") {
        const script = document.createElement('script');
        script.defer = true;
        script.src = endpoint + "/umami";
        script.setAttribute('data-website-id', websiteId);
        document.body.appendChild(script);
      }
    </script>
  </body>

</html>
